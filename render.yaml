# Render 배포 설정 (Blueprint)
# render.com 에서 이 저장소를 연결하면 아래 설정이 자동 적용됩니다.
services:
  - type: web
    name: pnu-haksik-congestion
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # 구글 Apps Script 웹앱 /exec URL — Render 대시보드에서 값 입력(코드에 저장 안 함)
      - key: SHEET_WEBHOOK_URL
        sync: false
